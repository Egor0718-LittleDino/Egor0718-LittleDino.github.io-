    const getFileIcon = (fileName, isFolder) => {
        const baseClass = "transition-transform duration-200 transform hover:scale-120 inline-block ";
        if (isFolder) return baseClass + "fas fa-folder text-yellow-500";
        const ext = fileName.split('.').pop().toLowerCase();
        switch (ext) {
            case 'pdf': return baseClass + "fas fa-file-pdf text-red-500";
            case 'doc': case 'docx': return baseClass + "fas fa-file-word text-blue-600";
            case 'ppt': case 'pptx': return baseClass + "fas fa-file-powerpoint text-orange-500";
            case 'xls': case 'xlsx': return baseClass + "fas fa-file-excel text-green-600";
            default: return baseClass + "fas fa-file-alt text-gray-400";
        }
    };

        const [selectedFiles, setSelectedFiles] = useState([]);

        };

        const handleSelectAll = (checked) => {
            setSelectedFiles(checked ? initialFiles.map(f => f.id) : []);
        };

        const isAllSelected = initialFiles.length > 0 && selectedFiles.length === initialFiles.length;

        return (
            <div className="flex h-full text-white overflow-hidden" style={{animation: 'fadeIn 0.6s ease-out'}}>

                <i class="fa-solid fa-wand-sparkles"></i>

                <span>變魔術</span>
            </button>
        </div>
    </aside>



    <main class="flex-1 p-12 overflow-y-auto h-screen">
        <div class="flex justify-between items-start mb-12">
            <div>

                <h2 id="mainTitle" class="text-5xl font-black mb-8 tracking-tight">全部檔案</h2>

                <div class="flex gap-4">

                    <label class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-2xl cursor-pointer border border-slate-700 transition-all flex items-center gap-3">

                        <i class="fa-solid fa-plus text-blue-400"></i> 本機上傳

                        <input type="file" id="fileInput" class="hidden">

                    </label>

                    <button id="driveBtn" class="bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-2xl border border-slate-700 transition-all flex items-center gap-3">

                        <i class="fa-brands fa-google-drive text-green-400"></i> 雲端匯入

                    </button>
                </div>
            </div>

            <div class="flex flex-col gap-4">

                <button id="batchBtn" class="bg-blue-600 hover:bg-blue-500 px-8 py-5 rounded-3xl font-bold transition-all shadow-xl shadow-blue-900/30 flex items-center gap-3 transform hover:-translate-y-1">

                    <i class="fa-solid fa-folder-plus text-xl"></i> 建立新專案

                </button>

                <button id="deleteSelectedBtn" class="bg-slate-800 hover:bg-red-900/40 text-red-400 border border-red-900/50 px-8 py-3 rounded-2xl font-semibold transition flex items-center gap-3">

                    <i class="fa-solid fa-trash-can"></i> 一鍵刪除勾選

                </button>

            </div>
        </div>



        <div class="card rounded-[3rem] p-10 shadow-2xl">

            <table class="w-full text-left">

                <thead class="text-slate-500 text-sm font-bold border-b border-slate-700">

                    <tr>

                        <th class="pb-6 w-20 text-center"><input type="checkbox" id="selectAll" class="w-5 h-5 cursor-pointer accent-blue-500"></th>

                        <th class="pb-6">檔案名稱</th>

                        <th class="pb-6">日期</th>

                        <th class="pb-6 text-right pr-4">管理</th>

                    </tr>

                </thead>

                <tbody id="fileList" class="divide-y divide-slate-800/50"></tbody>

            </table>

            <div id="emptyMsg" class="py-32 text-center text-slate-500 font-medium hidden italic">目前此分類下沒有檔案</div>

        </div>

    </main>



    <div id="progressModal" class="fixed inset-0 hidden items-center justify-center z-[200]">

        <div class="bg-slate-900 border border-slate-700 p-10 rounded-[2.5rem] w-96 text-center shadow-2xl">

            <div class="text-blue-400 mb-6 text-4xl animate-bounce"><i class="fa-solid fa-cloud-arrow-down"></i></div>

            <h3 class="text-xl font-bold mb-4">匯入中...</h3>

            <div class="w-full bg-slate-800 rounded-full h-3 mb-4 overflow-hidden">

                <div id="progressBar" class="bg-blue-500 h-full transition-all" style="width: 0%"></div>

            </div>

            <p id="progressText" class="text-slate-400 font-mono text-sm">0%</p>

        </div>

    </div>



    <div id="driveModal" class="fixed inset-0 hidden items-center justify-center z-[190]">

        <div class="bg-slate-900 border border-slate-700 p-10 rounded-[3rem] w-[600px] shadow-2xl">

            <h3 class="text-2xl font-bold mb-8 flex items-center gap-4"><i class="fa-brands fa-google-drive text-blue-400"></i> Drive 檔案</h3>

            <div id="driveFileList" class="max-h-80 overflow-y-auto pr-4 divide-y divide-slate-800"></div>

            <button onclick="closeDriveModal()" class="w-full mt-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold transition">返回</button>

        </div>

    </div>



    <script>



        let currentProjectId = null;



        // 變魔術功能入口

        function startMagic() {

            // 這裡將連接至你上傳的 index.js 介面邏輯

            alert("✨ 準備開始變魔術！正在加載 AI 分析介面...");

            // 實際跳轉或開啟 Modal 邏輯

        }



        window.onload = () => { selectProject(null, '全部檔案'); };



        async function selectProject(id, name) {

            currentProjectId = id;

            document.getElementById('mainTitle').innerText = name;

            await loadProjects();

            await refreshFiles();

        }



        const refreshFiles = async () => {

    const url = currentProjectId ? `/api/files?projectId=${currentProjectId}` : '/api/files';

    const res = await fetch(url);

    const { files } = await res.json();

    document.getElementById('emptyMsg').style.display = files.length ? 'none' : 'block';

   

    document.getElementById('fileList').innerHTML = files.map(f => `

        <tr class="hover:bg-slate-800/40 transition group cursor-default" ondblclick="window.open('/uploads/${f.id}', '_blank')">

            <td class="py-7 text-center">

                <input type="checkbox" class="row-cb w-5 h-5 cursor-pointer accent-blue-500" value="${f.id}">

            </td>

            <td class="py-7 font-bold text-slate-200 group-hover:text-blue-400 transition-colors flex items-center gap-3">

                <i class="${getFileIcon(f.name, false)} text-xl w-8 text-center"></i>

                ${f.name}

            </td>

            <td class="py-7 text-slate-500 text-sm">${f.date}</td>

            <td class="py-7 text-right pr-4">

                <button onclick="deleteFile('${f.id}')" class="text-slate-600 hover:text-red-400 transition p-2">

                    <i class="fa-solid fa-trash-can"></i>

                </button>

            </td>

        </tr>`).join('');

};



        const loadProjects = async () => {

            const res = await fetch('/api/projects');

            const { projects } = await res.json();

            const allBtn = `<div class="project-item flex items-center p-5 rounded-[1.5rem] cursor-pointer ${currentProjectId === null ? 'active' : 'text-slate-400'}" onclick="selectProject(null, '全部檔案')"><div class="flex items-center gap-4"><i class="fa-solid fa-folder-open ${currentProjectId === null ? 'text-blue-400' : 'text-slate-500'} text-xl"></i><div class="font-bold text-lg">全部檔案</div></div></div>`;

            const projectsHtml = projects.map((p, index) => `<div style="animation-delay: ${index * 0.05}s" class="project-item flex items-center justify-between p-5 rounded-[1.5rem] cursor-pointer ${currentProjectId === p.id ? 'active' : 'text-slate-400'}" onclick="selectProject(${p.id}, '${p.name}')"><div class="flex items-center gap-4"><i class="fa-solid fa-folder ${currentProjectId === p.id ? 'text-amber-400' : 'text-slate-500'} text-xl"></i><div><div class="font-bold text-lg text-slate-200">${p.name}</div><div class="text-xs font-bold text-slate-500 uppercase tracking-wide">${p.fileCount} 份檔案</div></div></div><button onclick="event.stopPropagation(); deleteProject(${p.id})" class="text-slate-600 hover:text-red-400 transition px-2"><i class="fa-solid fa-xmark"></i></button></div>`).join('');

            document.getElementById('projectList').innerHTML = allBtn + projectsHtml;

        };



        document.getElementById('driveBtn').onclick = async () => {

            const res = await fetch('/api/drive-files').catch(() => null);

            if (!res || res.status !== 200) return window.open((await (await fetch('/api/auth-url')).json()).url, '_blank');

            const { files } = await res.json();

            document.getElementById('driveModal').style.display = 'flex';

            // 找到 driveBtn.onclick 裡面的這一行，修改它

document.getElementById('driveFileList').innerHTML = files.map(f => {

    // 判斷是否為資料夾來更換圖示

    const isFolder = f.mimeType === 'application/vnd.google-apps.folder';

    const icon = isFolder ? 'fa-folder text-yellow-500' : 'fa-file-lines text-blue-400';

   

    return `

    <div class="py-5 flex justify-between items-center group">

        <div class="flex items-center gap-3">

            <i class="fa-solid ${icon}"></i>

            <span class="text-slate-300 font-medium text-lg">${f.name}</span>

        </div>

        <button onclick="importDriveFile('${f.id}', '${f.name}', '${f.mimeType}')"

                class="bg-blue-600/20 text-blue-400 px-5 py-2 rounded-xl text-sm font-bold hover:bg-blue-600 hover:text-white transition">

            匯入${isFolder ? '為專案' : ''}

        </button>

    </div>`;

}).join('');

        };

async function importDriveFile(fileId, fileName, mimeType) {

    closeDriveModal();

    const isFolder = mimeType === 'application/vnd.google-apps.folder';



    if (isFolder) {

        if (!confirm(`確定將「${fileName}」建立為新專案？`)) return;



        const modal = document.getElementById('projectProgressModal');

        const bar = document.getElementById('projectProgressBar');

        const text = document.getElementById('projectProgressText');

        const detail = document.getElementById('projectStatusDetail');

       

        modal.style.display = 'flex';

       

        // --- 核心修正：啟動 SSE 監聽 ---

        const eventSource = new EventSource('/api/import-progress');

        eventSource.onmessage = (event) => {

            const data = JSON.parse(event.data);

            bar.style.width = data.percent + '%';

            text.innerText = data.percent + '%';

            detail.innerText = data.status;

           

            if (data.percent >= 100) {

                eventSource.close();

            }

        };



        try {

            const res = await fetch('/api/create-project-from-drive', {

                method: 'POST',

                headers: { 'Content-Type': 'application/json' },

                body: JSON.stringify({ folderId: fileId, projectName: fileName })

            });
            
            const data = await res.json();

            if (res.ok && data.success) {
                // 等待一下讓使用者看到 100% 的成功感
                setTimeout(() => {
                    modal.style.display = 'none';
                    loadProjects();
                    // 自動開啟剛匯入好的魔術介面
                    window.startMagicWithData(fileName, data.files || []);
                }, 1000);
            } else {
                throw new Error(data.error || '伺服器錯誤');
            }

        } catch (err) {
            eventSource.close();
            alert('匯入失敗：' + err.message);
            modal.style.display = 'none';
        }
    } else {
        alert("正在匯入單一檔案...");
        // 這裡可以呼叫原本的 /api/import-drive 邏輯
    }

}

   

        document.getElementById('deleteSelectedBtn').onclick = async () => {
            const ids = Array.from(document.querySelectorAll('.row-cb:checked')).map(c => c.value);
            if (ids.length && confirm('確定刪除已選檔案？')) {
                await fetch('/api/files/batch-delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fileIds: ids }) });
                refreshFiles(); document.getElementById('selectAll').checked = false;
            }
        };

        document.getElementById('batchBtn').onclick = async () => {
            const ids = Array.from(document.querySelectorAll('.row-cb:checked')).map(c => c.value);
            if (!ids.length) return alert('請先選取檔案');
            const name = prompt('專案名稱：');
            if (name) { await fetch('/api/create-project', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, fileIds: ids }) }); loadProjects(); refreshFiles(); document.getElementById('selectAll').checked = false; }};
